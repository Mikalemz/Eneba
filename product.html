<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eneba Clone - Detalle del Producto</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <strong>ENEBA CLONE</strong>
        <div class="buscador">
          <input type="text" placeholder="Buscar juegos divertidos..." />
          <button>Buscar</button>
        </div>
        <div class="usuario">
          <span>Tienda</span>
          <span>Login</span>
        </div>
      </nav>
    </header>

    <main>
      <nav class="migas-pan">
        <a href="index.html">← Volver a la tienda</a>
      </nav>

      <section class="contenedor-producto">
        <div class="columna-izquierda">
          <div class="carrusel">
            <img src="img/doom.jpg" alt="Doom" />
            <div class="controles">
              <span>●</span> <span class="gris">●</span>
              <span class="gris">●</span>
            </div>
          </div>
        </div>

        <div class="columna-derecha">
          <h1>The Last of Us Part I</h1>

          <div class="plataformas">
            <button>PC</button>
            <button>PS5</button>
            <button>XBOX</button>
            <button>SWITCH</button>
          </div>

          <div class="caja-compra">
            <div class="precios">
              <span class="precio-actual">62.99€</span>
              <span class="precio-antes">69.99€</span>
            </div>
            <button class="btn-añadir">Añadir al carrito</button>
          </div>

          <div class="descripcion">
            <h3>Descripción</h3>
            <p>
              Experience the emotional storytelling and unforgettable
              characters.
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Eneba Clone MVP. Proyecto Educativo.</p>
    </footer>
  </body>
</html>
