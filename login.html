<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eneba Clone - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

    <header>
        <nav>
            <h1><a href="index.html">ENEBA CLONE</a></h1>
            <div class="buscador">
                <input type="text" placeholder="Buscar juegos divertidos...">
                <button type="button">Buscar</button>
            </div>
            <div class="enlaces-usuario">
                <a href="index.html">Tienda</a>
                <a href="carrito.html"><img src="imagenes/carrito.png" alt="Cart" class="cart-img"></a>
                <a href="login.html">Login</a>
            </div>
        </nav>
    </header>

    <main class="login-main">
        <section class="tarjeta-login">
            <h2>Bienvenido de nuevo</h2>
            <p class="subtitulo">Accede a tu cuenta para gestionar tus juegos</p>

            <form>
                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com">
                </div>

                <div class="campo">
                    <label>Contraseña</label>
                    <input type="password" placeholder="Tu contraseña secreta">
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <p class="registro">¿Aún no tienes cuenta? <a href="#">Regístrate aquí</a></p>
        </section>
    </main>

    <footer>
        <p>© 2026 Eneba Clone MVP. Proyecto Educativo.</p>
    </footer>

</body>
</html>
